<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2AB3A4">
    <title>Brécey bouge autrement - Schéma cyclable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #2AB3A4;
            --color-accent: #4CAF50;
            --color-accent-dark: #43A047;
            --color-text: #1a1a2e;
            --color-text-light: #64748b;
            --color-bg: #f8fafc;
            --color-wimoov: #E94E1B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--color-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            text-align: center;
            height: 100%;
        }

        /* Logo vélo avec contour turquoise */
        .logo-velo {
            width: 130px;
            height: auto;
            animation: float 3s ease-in-out infinite;
            border-radius: 16px;
            border: 3px solid var(--color-primary);
            padding: 10px;
            background: white;
            transition: all 0.3s ease;
        }

        .logo-velo:hover {
            border-color: #229487;
            box-shadow: 0 8px 25px rgba(42, 179, 164, 0.4);
            transform: scale(1.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Description courte */
        .description {
            font-size: 1rem;
            color: var(--color-text-light);
            max-width: 300px;
            line-height: 1.5;
        }

        /* Bouton CTA turquoise */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, #229487 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(42, 179, 164, 0.4);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(42, 179, 164, 0.5);
        }

        /* Section basse */
        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Wimoov */
        .wimoov-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .wimoov-logo {
            height: 45px;
        }

        .wimoov-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-wimoov);
        }

        .wimoov-slogan {
            font-size: 0.75rem;
            font-style: italic;
            color: var(--color-text-light);
        }

        /* Partenaire */
        .partner-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .partner-label {
            font-size: 0.65rem;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .partner-logo {
            height: 30px;
            opacity: 0.9;
        }

        /* Responsive tablette/desktop */
        @media (min-width: 500px) {
            .main-container {
                gap: 30px;
            }
            .logo-velo {
                width: 160px;
                padding: 15px;
            }
            .description {
                font-size: 1.1rem;
                max-width: 400px;
            }
            .cta-button {
                font-size: 1.3rem;
                padding: 18px 55px;
            }
            .wimoov-logo {
                height: 55px;
            }
            .partner-logo {
                height: 35px;
            }
        }
    </style>
</head>
<body>
    <main class="main-container">
        <!-- Logo campagne -->
        <img src="assets/logo-velo.png" alt="Brécey bouge autrement" class="logo-velo">

        <!-- Description -->
        <p class="description">
            Votre avis compte pour améliorer les déplacements à vélo !
        </p>

        <!-- Bouton -->
        <a href="questionnaire.html" class="cta-button">
            Je participe !
        </a>

        <!-- Bas : Wimoov + Partenaire -->
        <div class="bottom-section">
            <div class="wimoov-block">
                <img src="assets/logo-wimoov.png" alt="Wimoov" class="wimoov-logo">
                <p class="wimoov-text">Conçu par Wimoov</p>
                <p class="wimoov-slogan">« Provocateur de mobilité »</p>
            </div>

            <div class="partner-section">
                <p class="partner-label">Une démarche portée par</p>
                <img src="assets/logo-altermob.png" alt="Alter.Mob" class="partner-logo">
            </div>
        </div>
    </main>
</body>
</html>
